# Build-time: pass NUXT_PUBLIC_* and NUXT_SITE_URL via docker/.env (or shell env)
# so `docker compose build` bakes correct hosts into `.output`.
# See docker/Dockerfile header comments.

services:
  frontend:
    container_name: iartnet_frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NUXT_PUBLIC_APP_VERSION: ${NUXT_PUBLIC_APP_VERSION:-0.0.0-dev}
        NUXT_PUBLIC_BASE_URL: ${NUXT_PUBLIC_BASE_URL:-}
        NUXT_PUBLIC_BASE_DATA_URL: ${NUXT_PUBLIC_BASE_DATA_URL:-}
        NUXT_PUBLIC_BASEIIIF_URL: ${NUXT_PUBLIC_BASEIIIF_URL:-}
        NUXT_SITE_URL: ${NUXT_SITE_URL:-}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-}
        NUXT_PUBLIC_SHOW_HIDDEN_DATA: ${NUXT_PUBLIC_SHOW_HIDDEN_DATA:-}
        NUXT_PUBLIC_WAI_ENABLED: ${NUXT_PUBLIC_WAI_ENABLED:-false}
        NUXT_PUBLIC_WAI_SITE_ID: ${NUXT_PUBLIC_WAI_SITE_ID:-}
        NUXT_PUBLIC_WAI_TRACKER_URL: ${NUXT_PUBLIC_WAI_TRACKER_URL:-https://ingestion.webanalytics.italia.it/}
        NUXT_PUBLIC_WAI_DOMAINS: ${NUXT_PUBLIC_WAI_DOMAINS:-}
        NUXT_PUBLIC_SITEMAP_ENABLED: ${NUXT_PUBLIC_SITEMAP_ENABLED:-false}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      NODE_ENV: "production"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 3s
      retries: 10
